<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>Badam 7 · Scorer</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green-deep:   #0f2d1f;
    --green-table:  #1b4332;
    --green-felt:   #2d6a4f;
    --green-light:  #40916c;
    --cream:        #f5f0e8;
    --cream-dim:    #c9c0ae;
    --gold:         #d4a017;
    --gold-light:   #f0c040;
    --red-card:     #c0392b;
    --card-bg:      #fdfaf4;
    --shadow:       0 4px 24px rgba(0,0,0,0.45);
    --radius:       16px;
    --radius-sm:    10px;
  }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--green-deep);
    color: var(--cream);
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 0 40px;
    background-image:
      radial-gradient(ellipse at 20% 0%, #2d6a4f33 0%, transparent 60%),
      radial-gradient(ellipse at 80% 100%, #40916c22 0%, transparent 60%);
  }

  /* ── Header ── */
  .app-header {
    width: 100%;
    background: var(--green-table);
    border-bottom: 2px solid var(--green-felt);
    padding: 18px 20px 14px;
    text-align: center;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 16px rgba(0,0,0,0.4);
  }
  .app-header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 1.6rem;
    font-weight: 800;
    letter-spacing: 0.04em;
    color: var(--gold);
    line-height: 1;
  }
  .app-header h1 span { color: var(--cream); }
  .app-header p {
    font-size: 0.72rem;
    color: var(--cream-dim);
    margin-top: 4px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  /* ── Screens ── */
  .screen {
    display: none;
    width: 100%;
    max-width: 480px;
    padding: 24px 16px;
    animation: fadeUp 0.28s ease both;
  }
  .screen.active { display: block; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── Panel ── */
  .panel {
    background: var(--green-table);
    border: 1px solid var(--green-felt);
    border-radius: var(--radius);
    padding: 22px 18px;
    margin-bottom: 16px;
    box-shadow: var(--shadow);
  }
  .panel-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    color: var(--gold);
    margin-bottom: 16px;
  }

  /* ── Generic inputs ── */
  label {
    display: block;
    font-size: 0.78rem;
    font-weight: 600;
    color: var(--cream-dim);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 6px;
  }
  .field-input {
    width: 100%;
    background: var(--green-deep);
    border: 1.5px solid var(--green-felt);
    border-radius: var(--radius-sm);
    color: var(--cream);
    font-family: 'Inter', sans-serif;
    font-size: 1rem;
    padding: 12px 14px;
    outline: none;
    transition: border-color 0.18s;
    margin-bottom: 14px;
    -webkit-appearance: none;
    appearance: none;
  }
  .field-input:focus { border-color: var(--gold); }
  .field-input::placeholder { color: #5a7a6a; }

  /* Player count big input */
  #player-count-input {
    font-size: 2rem;
    font-weight: 700;
    text-align: center;
    padding: 18px 14px;
    letter-spacing: 0.05em;
    margin-bottom: 8px;
  }
  .count-hint {
    text-align: center;
    font-size: 0.78rem;
    color: var(--cream-dim);
    margin-bottom: 18px;
  }

  /* ── Buttons ── */
  .btn {
    display: block;
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: var(--radius-sm);
    font-family: 'Inter', sans-serif;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.1s, box-shadow 0.1s;
    letter-spacing: 0.02em;
    margin-top: 10px;
  }
  .btn:first-child { margin-top: 0; }
  .btn:active { transform: scale(0.97); }
  .btn-primary  { background: var(--gold); color: var(--green-deep); }
  .btn-primary:hover { box-shadow: 0 0 0 3px #d4a01740; }
  .btn-secondary { background: var(--green-felt); color: var(--cream); }
  .btn-danger   { background: var(--red-card); color: #fff; }
  .btn-ghost    { background: transparent; color: var(--cream-dim);
                  border: 1px solid var(--green-felt); font-size: 0.85rem; }

  /* ── Score rows ── */
  .score-row {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--card-bg);
    border-radius: var(--radius-sm);
    padding: 10px 14px;
    margin-bottom: 10px;
    border: 1px solid #d4c9b0;
    box-shadow: 0 2px 8px rgba(0,0,0,0.18);
  }
  .player-icon {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: var(--green-table);
    display: flex; align-items: center; justify-content: center;
    font-size: 1rem; font-weight: 700;
    color: var(--gold);
    flex-shrink: 0;
    font-family: 'Playfair Display', serif;
  }
  .player-name-label {
    flex: 1;
    font-weight: 600;
    color: var(--green-deep);
    font-size: 0.95rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .score-input {
    width: 80px;
    padding: 8px 6px;
    font-size: 1.05rem;
    text-align: center;
    border-radius: 8px;
    background: var(--green-deep);
    color: var(--cream);
    border: 1.5px solid var(--green-felt);
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    outline: none;
    -webkit-appearance: none;
    appearance: none;
    flex-shrink: 0;
  }
  .score-input:focus { border-color: var(--gold); }

  /* ── History table ── */
  .rounds-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.83rem;
    margin-top: 6px;
  }
  .rounds-table th {
    background: var(--green-deep);
    color: var(--gold);
    padding: 7px 8px;
    text-align: center;
    font-weight: 600;
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    white-space: nowrap;
  }
  .rounds-table th:first-child { text-align: left; border-radius: 8px 0 0 0; }
  .rounds-table th:last-child  { border-radius: 0 8px 0 0; }
  .rounds-table td {
    padding: 8px;
    text-align: center;
    color: var(--cream);
    border-bottom: 1px solid #1f3d2d;
    white-space: nowrap;
  }
  .rounds-table td:first-child { text-align: left; font-weight: 500; }
  .rounds-table tr:last-child td { border-bottom: none; }
  .rounds-table tr:nth-child(even) td { background: #0f2d1f44; }

  /* ── Leaderboard ── */
  .lb-row {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 16px;
    border-radius: var(--radius-sm);
    margin-bottom: 10px;
    background: var(--green-table);
    border: 1px solid var(--green-felt);
  }
  .lb-row.rank-1 {
    background: linear-gradient(135deg, #2d4a1e, #1b4332);
    border-color: var(--gold);
    box-shadow: 0 0 0 2px #d4a01740, var(--shadow);
  }
  .lb-rank {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem; font-weight: 800;
    color: var(--cream-dim);
    width: 28px; text-align: center; flex-shrink: 0;
  }
  .lb-row.rank-1 .lb-rank { color: var(--gold); font-size: 1.6rem; }
  .lb-trophy { font-size: 1.4rem; }
  .lb-name { flex: 1; font-weight: 600; font-size: 1rem; color: var(--cream); }
  .lb-row.rank-1 .lb-name { color: var(--gold-light); font-size: 1.05rem; }
  .lb-score { font-size: 1.2rem; font-weight: 700; color: var(--cream);
              font-family: 'Playfair Display', serif; }
  .lb-row.rank-1 .lb-score { color: var(--gold); font-size: 1.4rem; }
  .lb-pts { font-size: 0.7rem; color: var(--cream-dim); font-weight: 400; margin-left: 2px; }

  /* ── Misc ── */
  .round-badge {
    display: inline-block;
    background: var(--green-deep);
    border: 1px solid var(--green-felt);
    border-radius: 999px;
    font-size: 0.72rem; font-weight: 600;
    color: var(--cream-dim);
    padding: 4px 12px;
    margin-bottom: 14px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  .totals-strip {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }
  .total-chip {
    background: var(--green-deep);
    border: 1px solid var(--green-felt);
    border-radius: 999px;
    padding: 5px 12px;
    font-size: 0.82rem;
    color: var(--cream);
    display: flex; align-items: center; gap: 6px;
  }
  .total-chip strong { color: var(--gold); }
  .winner-banner {
    font-family: 'Playfair Display', serif;
    font-size: 1rem;
    color: var(--gold);
    text-align: center;
    padding: 10px;
    background: #1b3a10;
    border: 1px solid var(--gold);
    border-radius: var(--radius-sm);
    margin-bottom: 20px;
  }
  .suit-deco { font-size: 0.9rem; opacity: 0.5; margin: 0 4px; }
  .divider { border: none; border-top: 1px solid var(--green-felt); margin: 16px 0; }

  /* ── Modal ── */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 200;
    align-items: center; justify-content: center;
    padding: 20px;
  }
  .modal-overlay.open { display: flex; }
  .modal-box {
    background: var(--green-table);
    border: 1px solid var(--green-felt);
    border-radius: var(--radius);
    padding: 28px 22px;
    width: 100%; max-width: 340px;
    box-shadow: var(--shadow);
    animation: fadeUp 0.22s ease both;
  }
  .modal-box h2 {
    font-family: 'Playfair Display', serif;
    color: var(--red-card);
    font-size: 1.2rem;
    margin-bottom: 8px;
  }
  .modal-box p {
    font-size: 0.88rem;
    color: var(--cream-dim);
    margin-bottom: 18px;
    line-height: 1.5;
  }
  .modal-box p strong { color: var(--cream); }
  .modal-error {
    font-size: 0.8rem;
    color: var(--red-card);
    margin-top: -10px;
    margin-bottom: 12px;
    min-height: 18px;
  }
  .modal-btns { display: flex; gap: 10px; }
  .modal-btns .btn { margin-top: 0; }
</style>
</head>
<body>

<header class="app-header">
  <h1>Badam <span>7</span></h1>
  <p>Card Score Tracker</p>
</header>

<!-- ══ SCREEN 1 · Player Count ══ -->
<div class="screen active" id="screen-count">
  <div class="panel">
    <p class="panel-title">How many players?</p>
    <label for="player-count-input">Number of players</label>
    <input class="field-input" type="number" id="player-count-input"
           min="2" max="20" placeholder="e.g. 4"
           inputmode="numeric" pattern="[0-9]*" />
    <p class="count-hint">Enter any number between 2 and 20</p>
    <button class="btn btn-primary" onclick="goToNames()">Continue →</button>
  </div>
</div>

<!-- ══ SCREEN 2 · Player Names ══ -->
<div class="screen" id="screen-names">
  <div class="panel">
    <p class="panel-title">Enter player names</p>
    <div id="name-fields"></div>
    <button class="btn btn-primary" onclick="startGame()">Start Game →</button>
    <button class="btn btn-secondary" onclick="showScreen('screen-count')">← Back</button>
  </div>
</div>

<!-- ══ SCREEN 3 · Score Entry ══ -->
<div class="screen" id="screen-score">
  <div id="round-badge-wrap"></div>
  <div class="totals-strip" id="totals-strip"></div>

  <div class="panel">
    <p class="panel-title">Scores for this round</p>
    <div id="score-fields"></div>
    <button class="btn btn-primary" onclick="saveRound()">Save Round ✓</button>
  </div>

  <div class="panel" id="history-panel" style="display:none">
    <p class="panel-title">Round History</p>
    <div style="overflow-x:auto">
      <table class="rounds-table" id="rounds-table"></table>
    </div>
  </div>

  <div class="panel">
    <button class="btn btn-secondary" onclick="addRound()">+ Add Another Round</button>
    <button class="btn btn-danger" onclick="endGame()">🏆 End Game &amp; See Results</button>
    <hr class="divider" />
    <button class="btn btn-ghost" onclick="openResetModal()">↺ Reset Everything</button>
  </div>
</div>

<!-- ══ SCREEN 4 · Leaderboard ══ -->
<div class="screen" id="screen-results">
  <div class="panel">
    <div class="winner-banner" id="winner-banner"></div>
    <div id="leaderboard"></div>
  </div>

  <div class="panel" id="final-history-panel">
    <p class="panel-title">All Rounds</p>
    <div style="overflow-x:auto">
      <table class="rounds-table" id="final-rounds-table"></table>
    </div>
  </div>

  <div class="panel">
    <button class="btn btn-primary" onclick="playAgain()">🃏 New Game (Same Players)</button>
    <button class="btn btn-secondary" onclick="newGameNewPlayers()">👥 New Game (New Players)</button>
    <hr class="divider" />
    <button class="btn btn-ghost" onclick="openResetModal()">↺ Reset Everything</button>
  </div>
</div>

<!-- ══ Reset Modal ══ -->
<div class="modal-overlay" id="reset-modal" onclick="closeResetModalIfOutside(event)">
  <div class="modal-box">
    <h2>⚠️ Reset Everything?</h2>
    <p>This will delete all scores and player data permanently.<br/>
       Type <strong>Reset</strong> to confirm.</p>
    <label for="reset-password">Confirmation word</label>
    <input class="field-input" type="text" id="reset-password"
           placeholder="Type Reset here" autocomplete="off"
           oninput="document.getElementById('reset-error').textContent=''" />
    <p class="modal-error" id="reset-error"></p>
    <div class="modal-btns">
      <button class="btn btn-secondary" onclick="closeResetModal()" style="flex:1">Cancel</button>
      <button class="btn btn-danger" onclick="doReset()" style="flex:1">Reset</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════
// STATE
// ═══════════════════════════════
const LS_KEY = 'badam7_v2';

let state = loadState() || freshState();

function freshState() {
  return {
    phase: 'count',
    numPlayers: 0,
    players: [],      // { name, rounds:[], total }
    currentScores: {} // { playerIndex: rawValue } — temp, not yet saved
  };
}

// ═══════════════════════════════
// PERSISTENCE
// ═══════════════════════════════
function saveState() {
  try { localStorage.setItem(LS_KEY, JSON.stringify(state)); } catch(e) {}
}
function loadState() {
  try {
    const s = localStorage.getItem(LS_KEY);
    return s ? JSON.parse(s) : null;
  } catch(e) { return null; }
}
function clearState() {
  try { localStorage.removeItem(LS_KEY); } catch(e) {}
}

// ═══════════════════════════════
// ROUTING
// ═══════════════════════════════
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  const el = document.getElementById(id);
  el.classList.add('active');
  // re-trigger animation
  el.style.animation = 'none';
  el.offsetHeight; // reflow
  el.style.animation = '';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function restoreFromState() {
  if (state.phase === 'count') {
    showScreen('screen-count');
    if (state.numPlayers >= 2) {
      document.getElementById('player-count-input').value = state.numPlayers;
    }
  } else if (state.phase === 'names') {
    showScreen('screen-names');
    buildNameFields();
  } else if (state.phase === 'scoring') {
    buildScoreScreen();
    showScreen('screen-score');
  } else if (state.phase === 'results') {
    buildResults();
    showScreen('screen-results');
  }
}

// ═══════════════════════════════
// SCREEN 1 — Count
// ═══════════════════════════════
function goToNames() {
  const raw = document.getElementById('player-count-input').value.trim();
  const n = parseInt(raw, 10);
  if (!raw || isNaN(n) || n < 2 || n > 20) {
    alert('Please enter a number of players between 2 and 20.');
    return;
  }
  state.numPlayers = n;
  // If re-visiting and player count changed, reset existing player list
  if (state.players.length !== n) {
    state.players = [];
  }
  state.phase = 'names';
  buildNameFields();
  showScreen('screen-names');
  saveState();
}

// ═══════════════════════════════
// SCREEN 2 — Names
// ═══════════════════════════════
function buildNameFields() {
  const wrap = document.getElementById('name-fields');
  wrap.innerHTML = '';
  for (let i = 0; i < state.numPlayers; i++) {
    const savedName = state.players[i] ? state.players[i].name : '';
    const lbl = document.createElement('label');
    lbl.setAttribute('for', `pname-${i}`);
    lbl.textContent = `Player ${i + 1}`;
    const inp = document.createElement('input');
    inp.className = 'field-input';
    inp.type = 'text';
    inp.placeholder = `Player ${i + 1} name`;
    inp.value = savedName;
    inp.id = `pname-${i}`;
    inp.setAttribute('autocomplete', 'off');
    // Allow Enter key to move to next field
    inp.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        const next = document.getElementById(`pname-${i + 1}`);
        if (next) next.focus(); else startGame();
      }
    });
    wrap.appendChild(lbl);
    wrap.appendChild(inp);
  }
  // Focus first empty field
  for (let i = 0; i < state.numPlayers; i++) {
    const inp = document.getElementById(`pname-${i}`);
    if (!inp.value) { inp.focus(); break; }
  }
}

function startGame() {
  const players = [];
  for (let i = 0; i < state.numPlayers; i++) {
    const inp = document.getElementById(`pname-${i}`);
    const name = (inp ? inp.value.trim() : '') || `Player ${i + 1}`;
    // Preserve existing round data if player is the same
    const existing = state.players[i];
    if (existing && existing.name === name) {
      players.push(existing);
    } else {
      players.push({ name, rounds: [], total: 0 });
    }
  }
  state.players = players;
  state.currentScores = {};
  state.phase = 'scoring';
  buildScoreScreen();
  showScreen('screen-score');
  saveState();
}

// ═══════════════════════════════
// SCREEN 3 — Score Entry
// ═══════════════════════════════
function currentRoundNumber() {
  // The round being entered is always one more than rounds already saved
  return (state.players[0] ? state.players[0].rounds.length : 0) + 1;
}

function buildScoreScreen() {
  // Round badge — reflects actual next round number
  document.getElementById('round-badge-wrap').innerHTML =
    `<span class="round-badge">♠ Round ${currentRoundNumber()} ♣</span>`;

  // Running totals
  const strip = document.getElementById('totals-strip');
  strip.innerHTML = state.players.map(p =>
    `<div class="total-chip"><span>${escHtml(p.name.split(' ')[0])}</span><strong>${p.total}</strong></div>`
  ).join('');

  // Score inputs
  const fields = document.getElementById('score-fields');
  fields.innerHTML = '';
  state.players.forEach((p, i) => {
    const savedVal = state.currentScores[i] !== undefined ? state.currentScores[i] : '';
    const row = document.createElement('div');
    row.className = 'score-row';

    const icon = document.createElement('div');
    icon.className = 'player-icon';
    icon.textContent = p.name[0].toUpperCase();

    const nameEl = document.createElement('div');
    nameEl.className = 'player-name-label';
    nameEl.textContent = p.name;

    const inp = document.createElement('input');
    inp.type = 'number';
    inp.className = 'score-input';
    inp.id = `score-${i}`;
    inp.min = '0';
    inp.placeholder = '0';
    inp.value = savedVal;
    inp.inputMode = 'numeric';
    inp.addEventListener('input', () => { state.currentScores[i] = inp.value; });
    inp.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        const next = document.getElementById(`score-${i + 1}`);
        if (next) next.focus(); else saveRound();
      }
    });

    row.appendChild(icon);
    row.appendChild(nameEl);
    row.appendChild(inp);
    fields.appendChild(row);
  });

  renderHistory();
}

function renderHistory() {
  const hasRounds = state.players.length > 0 && state.players[0].rounds.length > 0;
  document.getElementById('history-panel').style.display = hasRounds ? '' : 'none';
  if (!hasRounds) return;
  document.getElementById('rounds-table').innerHTML = buildHistoryHTML(state.players);
}

function buildHistoryHTML(players) {
  const numRounds = players[0].rounds.length;
  let html = '<thead><tr><th>Player</th>';
  for (let r = 1; r <= numRounds; r++) html += `<th>R${r}</th>`;
  html += '<th>Total</th></tr></thead><tbody>';
  players.forEach(p => {
    html += `<tr><td>${escHtml(p.name)}</td>`;
    p.rounds.forEach(s => html += `<td>${s}</td>`);
    html += `<td><strong>${p.total}</strong></td></tr>`;
  });
  return html + '</tbody>';
}

function saveRound() {
  // Collect & validate — must have a value for every player
  const scores = [];
  let firstMissing = -1;
  for (let i = 0; i < state.players.length; i++) {
    const inp = document.getElementById(`score-${i}`);
    const raw = inp ? inp.value.trim() : '';
    if (raw === '') {
      if (firstMissing === -1) firstMissing = i;
      scores.push(null);
    } else {
      scores.push(Math.max(0, parseInt(raw, 10) || 0));
    }
  }
  if (firstMissing !== -1) {
    alert(`Please enter a score for ${state.players[firstMissing].name}.`);
    document.getElementById(`score-${firstMissing}`).focus();
    return;
  }
  // Commit scores
  state.players.forEach((p, i) => {
    p.rounds.push(scores[i]);
    p.total += scores[i];
  });
  state.currentScores = {};
  buildScoreScreen();
  saveState();
}

function addRound() {
  // currentScores cleared so inputs are fresh
  state.currentScores = {};
  buildScoreScreen();
  window.scrollTo({ top: 0, behavior: 'smooth' });
  // No need to change any round counter — currentRoundNumber() derives it
  saveState();
}

// ═══════════════════════════════
// SCREEN 4 — Results
// ═══════════════════════════════
function endGame() {
  if (!state.players[0] || state.players[0].rounds.length === 0) {
    alert('Save at least one round before ending the game.');
    return;
  }
  state.phase = 'results';
  buildResults();
  showScreen('screen-results');
  saveState();
}

function buildResults() {
  const sorted = [...state.players].sort((a, b) => a.total - b.total);

  document.getElementById('winner-banner').innerHTML =
    `🏆 Winner: <strong>${escHtml(sorted[0].name)}</strong> — ${sorted[0].total} pts <span class="suit-deco">♠ ♥ ♦ ♣</span>`;

  document.getElementById('leaderboard').innerHTML = sorted.map((p, i) => {
    const trophy = ['🥇','🥈','🥉'][i] || '';
    return `<div class="lb-row${i === 0 ? ' rank-1' : ''}">
      <div class="lb-rank">${i + 1}</div>
      ${trophy ? `<div class="lb-trophy">${trophy}</div>` : '<div style="width:24px"></div>'}
      <div class="lb-name">${escHtml(p.name)}</div>
      <div class="lb-score">${p.total}<span class="lb-pts">pts</span></div>
    </div>`;
  }).join('');

  const fhp = document.getElementById('final-history-panel');
  if (state.players[0] && state.players[0].rounds.length > 0) {
    fhp.style.display = '';
    document.getElementById('final-rounds-table').innerHTML = buildHistoryHTML(state.players);
  } else {
    fhp.style.display = 'none';
  }
}

function playAgain() {
  // Same players, reset all scores
  state.players = state.players.map(p => ({ name: p.name, rounds: [], total: 0 }));
  state.currentScores = {};
  state.phase = 'scoring';
  buildScoreScreen();
  showScreen('screen-score');
  saveState();
}

function newGameNewPlayers() {
  state = freshState();
  clearState();
  showScreen('screen-count');
  document.getElementById('player-count-input').value = '';
}

// ═══════════════════════════════
// RESET MODAL
// ═══════════════════════════════
function openResetModal() {
  document.getElementById('reset-password').value = '';
  document.getElementById('reset-error').textContent = '';
  document.getElementById('reset-modal').classList.add('open');
  setTimeout(() => document.getElementById('reset-password').focus(), 100);
}
function closeResetModal() {
  document.getElementById('reset-modal').classList.remove('open');
}
function closeResetModalIfOutside(e) {
  if (e.target === document.getElementById('reset-modal')) closeResetModal();
}
function doReset() {
  const val = document.getElementById('reset-password').value.trim();
  if (val !== 'Reset') {
    document.getElementById('reset-error').textContent = 'Incorrect — type exactly: Reset';
    document.getElementById('reset-password').focus();
    return;
  }
  closeResetModal();
  clearState();
  state = freshState();
  showScreen('screen-count');
  document.getElementById('player-count-input').value = '';
}

// ═══════════════════════════════
// UTILS
// ═══════════════════════════════
function escHtml(str) {
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ═══════════════════════════════
// INIT
// ═══════════════════════════════
restoreFromState();
</script>
</body>
</html>
