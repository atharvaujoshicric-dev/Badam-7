<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>Badam 7 · Scorer</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green-deep:   #0f2d1f;
    --green-table:  #1b4332;
    --green-felt:   #2d6a4f;
    --green-light:  #40916c;
    --cream:        #f5f0e8;
    --cream-dim:    #c9c0ae;
    --gold:         #d4a017;
    --gold-light:   #f0c040;
    --red-card:     #c0392b;
    --white:        #ffffff;
    --card-bg:      #fdfaf4;
    --shadow:       0 4px 24px rgba(0,0,0,0.45);
    --radius:       16px;
    --radius-sm:    10px;
  }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--green-deep);
    color: var(--cream);
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 0 40px;
    background-image:
      radial-gradient(ellipse at 20% 0%, #2d6a4f33 0%, transparent 60%),
      radial-gradient(ellipse at 80% 100%, #40916c22 0%, transparent 60%);
  }

  /* ── Header ── */
  .app-header {
    width: 100%;
    background: var(--green-table);
    border-bottom: 2px solid var(--green-felt);
    padding: 18px 20px 14px;
    text-align: center;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 16px rgba(0,0,0,0.4);
  }
  .app-header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 1.6rem;
    font-weight: 800;
    letter-spacing: 0.04em;
    color: var(--gold);
    line-height: 1;
  }
  .app-header h1 span { color: var(--cream); }
  .app-header p {
    font-size: 0.72rem;
    color: var(--cream-dim);
    margin-top: 4px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  /* ── Screen container ── */
  .screen {
    display: none;
    width: 100%;
    max-width: 480px;
    padding: 24px 16px;
    animation: fadeUp 0.28s ease both;
  }
  .screen.active { display: block; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── Card panel ── */
  .panel {
    background: var(--green-table);
    border: 1px solid var(--green-felt);
    border-radius: var(--radius);
    padding: 22px 18px;
    margin-bottom: 16px;
    box-shadow: var(--shadow);
  }
  .panel-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    color: var(--gold);
    margin-bottom: 16px;
  }

  /* ── Inputs ── */
  label {
    display: block;
    font-size: 0.78rem;
    font-weight: 600;
    color: var(--cream-dim);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 6px;
  }
  input[type="number"], input[type="text"] {
    width: 100%;
    background: var(--green-deep);
    border: 1.5px solid var(--green-felt);
    border-radius: var(--radius-sm);
    color: var(--cream);
    font-family: 'Inter', sans-serif;
    font-size: 1rem;
    padding: 12px 14px;
    outline: none;
    transition: border-color 0.18s;
    margin-bottom: 14px;
    -webkit-appearance: none;
  }
  input:focus { border-color: var(--gold); }
  input::placeholder { color: #5a7a6a; }

  /* ── Buttons ── */
  .btn {
    display: block;
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: var(--radius-sm);
    font-family: 'Inter', sans-serif;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.1s, box-shadow 0.1s, opacity 0.15s;
    letter-spacing: 0.02em;
  }
  .btn:active { transform: scale(0.97); }
  .btn-primary {
    background: var(--gold);
    color: var(--green-deep);
  }
  .btn-primary:hover { box-shadow: 0 0 0 3px #d4a01740; }
  .btn-secondary {
    background: var(--green-felt);
    color: var(--cream);
    margin-top: 10px;
  }
  .btn-danger {
    background: var(--red-card);
    color: #fff;
    margin-top: 10px;
  }
  .btn + .btn { margin-top: 10px; }

  /* ── Player count selector ── */
  .count-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin-bottom: 20px;
  }
  .count-btn {
    aspect-ratio: 1;
    border: 2px solid var(--green-felt);
    border-radius: var(--radius-sm);
    background: var(--green-deep);
    color: var(--cream);
    font-size: 1.3rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
    display: flex; align-items: center; justify-content: center;
  }
  .count-btn:hover, .count-btn.selected {
    border-color: var(--gold);
    background: #1b3a2a;
    color: var(--gold);
    box-shadow: 0 0 0 3px #d4a01730;
  }

  /* ── Score entry — card style ── */
  .score-row {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--card-bg);
    border-radius: var(--radius-sm);
    padding: 10px 14px;
    margin-bottom: 10px;
    border: 1px solid #d4c9b0;
    box-shadow: 0 2px 8px rgba(0,0,0,0.18);
  }
  .score-row .player-icon {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: var(--green-table);
    display: flex; align-items: center; justify-content: center;
    font-size: 1rem;
    font-weight: 700;
    color: var(--gold);
    flex-shrink: 0;
    font-family: 'Playfair Display', serif;
  }
  .score-row .player-name {
    flex: 1;
    font-weight: 600;
    color: var(--green-deep);
    font-size: 0.95rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .score-row input[type="number"] {
    width: 80px;
    margin: 0;
    padding: 8px 10px;
    font-size: 1rem;
    text-align: center;
    border-radius: 8px;
    background: var(--green-deep);
    color: var(--cream);
    border: 1.5px solid var(--green-felt);
  }

  /* ── Round history ── */
  .rounds-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.83rem;
    margin-top: 6px;
  }
  .rounds-table th {
    background: var(--green-deep);
    color: var(--gold);
    padding: 7px 8px;
    text-align: center;
    font-weight: 600;
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .rounds-table th:first-child { text-align: left; border-radius: 8px 0 0 0; }
  .rounds-table th:last-child { border-radius: 0 8px 0 0; }
  .rounds-table td {
    padding: 8px 8px;
    text-align: center;
    color: var(--cream);
    border-bottom: 1px solid #1f3d2d;
  }
  .rounds-table td:first-child { text-align: left; font-weight: 500; }
  .rounds-table tr:last-child td { border-bottom: none; }
  .rounds-table tr:nth-child(even) td { background: #0f2d1f44; }

  /* ── Leaderboard ── */
  .lb-row {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 16px;
    border-radius: var(--radius-sm);
    margin-bottom: 10px;
    background: var(--green-table);
    border: 1px solid var(--green-felt);
    position: relative;
    overflow: hidden;
  }
  .lb-row.rank-1 {
    background: linear-gradient(135deg, #2d4a1e, #1b4332);
    border-color: var(--gold);
    box-shadow: 0 0 0 2px #d4a01740, var(--shadow);
  }
  .lb-rank {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
    font-weight: 800;
    color: var(--cream-dim);
    width: 28px;
    text-align: center;
    flex-shrink: 0;
  }
  .lb-row.rank-1 .lb-rank { color: var(--gold); font-size: 1.6rem; }
  .lb-trophy { font-size: 1.4rem; }
  .lb-name {
    flex: 1;
    font-weight: 600;
    font-size: 1rem;
    color: var(--cream);
  }
  .lb-row.rank-1 .lb-name { color: var(--gold-light); font-size: 1.05rem; }
  .lb-score {
    font-size: 1.2rem;
    font-weight: 700;
    color: var(--cream);
    font-family: 'Playfair Display', serif;
  }
  .lb-row.rank-1 .lb-score { color: var(--gold); font-size: 1.4rem; }
  .lb-pts { font-size: 0.7rem; color: var(--cream-dim); font-weight: 400; margin-left: 2px; }

  /* ── Game round header ── */
  .round-badge {
    display: inline-block;
    background: var(--green-deep);
    border: 1px solid var(--green-felt);
    border-radius: 999px;
    font-size: 0.72rem;
    font-weight: 600;
    color: var(--cream-dim);
    padding: 4px 12px;
    margin-bottom: 14px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  /* ── Running totals strip ── */
  .totals-strip {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }
  .total-chip {
    background: var(--green-deep);
    border: 1px solid var(--green-felt);
    border-radius: 999px;
    padding: 5px 12px;
    font-size: 0.82rem;
    color: var(--cream);
    display: flex; align-items: center; gap: 6px;
  }
  .total-chip strong { color: var(--gold); }

  /* ── Divider ── */
  .divider {
    border: none;
    border-top: 1px solid var(--green-felt);
    margin: 18px 0;
  }

  .text-center { text-align: center; }
  .mt-4 { margin-top: 16px; }
  .text-muted { color: var(--cream-dim); font-size: 0.85rem; }
  .winner-banner {
    font-family: 'Playfair Display', serif;
    font-size: 1rem;
    color: var(--gold);
    text-align: center;
    padding: 10px;
    background: #1b3a10;
    border: 1px solid var(--gold);
    border-radius: var(--radius-sm);
    margin-bottom: 20px;
  }
  .suit-deco {
    font-size: 0.9rem;
    opacity: 0.5;
    margin: 0 4px;
  }
</style>
</head>
<body>

<header class="app-header">
  <h1>Badam <span>7</span></h1>
  <p>Card Score Tracker</p>
</header>

<!-- ══════════════════════════════════════
     SCREEN 1 · Player Count
══════════════════════════════════════ -->
<div class="screen active" id="screen-count">
  <div class="panel">
    <p class="panel-title">How many players?</p>
    <div class="count-grid" id="count-grid"></div>
    <button class="btn btn-primary" onclick="goToNames()">Continue →</button>
  </div>
</div>

<!-- ══════════════════════════════════════
     SCREEN 2 · Player Names
══════════════════════════════════════ -->
<div class="screen" id="screen-names">
  <div class="panel">
    <p class="panel-title">Enter player names</p>
    <div id="name-fields"></div>
    <button class="btn btn-primary" onclick="startGame()">Start Game →</button>
    <button class="btn btn-secondary" onclick="showScreen('screen-count')">← Back</button>
  </div>
</div>

<!-- ══════════════════════════════════════
     SCREEN 3 · Score Entry
══════════════════════════════════════ -->
<div class="screen" id="screen-score">
  <div id="round-badge-wrap"></div>

  <!-- Running totals -->
  <div class="totals-strip" id="totals-strip"></div>

  <div class="panel">
    <p class="panel-title">Enter scores for this round</p>
    <div id="score-fields"></div>
    <button class="btn btn-primary" onclick="saveRound()">Save Round ✓</button>
  </div>

  <!-- Round history -->
  <div class="panel" id="history-panel" style="display:none">
    <p class="panel-title">Round History</p>
    <div style="overflow-x:auto">
      <table class="rounds-table" id="rounds-table"></table>
    </div>
  </div>

  <div class="panel">
    <button class="btn btn-secondary" onclick="addRound()">+ Add Another Round</button>
    <button class="btn btn-danger" onclick="endGame()">🏆 End Game & See Results</button>
    <button class="btn btn-secondary" onclick="confirmReset()" style="margin-top:14px;opacity:0.6;font-size:0.85rem">↺ Reset Everything</button>
  </div>
</div>

<!-- ══════════════════════════════════════
     SCREEN 4 · Leaderboard
══════════════════════════════════════ -->
<div class="screen" id="screen-results">
  <div class="panel">
    <div class="winner-banner" id="winner-banner"></div>
    <div id="leaderboard"></div>
  </div>

  <div class="panel" style="display:none" id="final-history-panel">
    <p class="panel-title">All Rounds</p>
    <div style="overflow-x:auto">
      <table class="rounds-table" id="final-rounds-table"></table>
    </div>
  </div>

  <div class="panel">
    <button class="btn btn-primary" onclick="playAgain()">🃏 New Game (Same Players)</button>
    <button class="btn btn-secondary" onclick="confirmReset()">↺ Reset Everything</button>
  </div>
</div>

<script>
// ══════════════════════════════════════
// STATE
// ══════════════════════════════════════
const LS_KEY = 'badam7_state';

let state = loadState() || {
  phase: 'count',      // count | names | scoring | results
  numPlayers: 0,
  players: [],         // [{ name, rounds:[], total }]
  currentRound: 1,
  currentScores: {},   // temp scores being entered
};

// ══════════════════════════════════════
// PERSISTENCE
// ══════════════════════════════════════
function saveState() {
  try { localStorage.setItem(LS_KEY, JSON.stringify(state)); } catch(e) {}
}
function loadState() {
  try {
    const s = localStorage.getItem(LS_KEY);
    return s ? JSON.parse(s) : null;
  } catch(e) { return null; }
}
function clearState() {
  try { localStorage.removeItem(LS_KEY); } catch(e) {}
}

// ══════════════════════════════════════
// SCREEN ROUTING
// ══════════════════════════════════════
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function restoreFromState() {
  if (state.phase === 'count') {
    buildCountGrid();
    showScreen('screen-count');
  } else if (state.phase === 'names') {
    buildCountGrid();
    showScreen('screen-count');
    goToNames();
  } else if (state.phase === 'scoring') {
    buildScoreScreen();
    showScreen('screen-score');
  } else if (state.phase === 'results') {
    buildResults();
    showScreen('screen-results');
  }
}

// ══════════════════════════════════════
// SCREEN 1 — Count
// ══════════════════════════════════════
function buildCountGrid() {
  const grid = document.getElementById('count-grid');
  grid.innerHTML = '';
  for (let i = 2; i <= 8; i++) {
    const b = document.createElement('button');
    b.className = 'count-btn' + (state.numPlayers === i ? ' selected' : '');
    b.textContent = i;
    b.onclick = () => {
      state.numPlayers = i;
      document.querySelectorAll('.count-btn').forEach(x => x.classList.remove('selected'));
      b.classList.add('selected');
    };
    grid.appendChild(b);
  }
}

function goToNames() {
  if (!state.numPlayers) {
    alert('Please select number of players.');
    return;
  }
  state.phase = 'names';
  buildNameFields();
  showScreen('screen-names');
  saveState();
}

// ══════════════════════════════════════
// SCREEN 2 — Names
// ══════════════════════════════════════
function buildNameFields() {
  const wrap = document.getElementById('name-fields');
  wrap.innerHTML = '';
  for (let i = 0; i < state.numPlayers; i++) {
    const val = state.players[i] ? state.players[i].name : '';
    const lbl = document.createElement('label');
    lbl.textContent = `Player ${i + 1}`;
    const inp = document.createElement('input');
    inp.type = 'text';
    inp.placeholder = `Player ${i + 1} name`;
    inp.value = val;
    inp.id = `pname-${i}`;
    inp.setAttribute('autocomplete', 'off');
    wrap.appendChild(lbl);
    wrap.appendChild(inp);
  }
}

function startGame() {
  const players = [];
  for (let i = 0; i < state.numPlayers; i++) {
    const inp = document.getElementById(`pname-${i}`);
    const name = (inp.value || '').trim() || `Player ${i + 1}`;
    players.push({ name, rounds: [], total: 0 });
  }
  state.players = players;
  state.currentRound = 1;
  state.currentScores = {};
  state.phase = 'scoring';
  buildScoreScreen();
  showScreen('screen-score');
  saveState();
}

// ══════════════════════════════════════
// SCREEN 3 — Score Entry
// ══════════════════════════════════════
function buildScoreScreen() {
  // Badge
  document.getElementById('round-badge-wrap').innerHTML =
    `<span class="round-badge">♠ Round ${state.currentRound} ♣</span>`;

  // Totals strip
  const strip = document.getElementById('totals-strip');
  strip.innerHTML = state.players.map(p =>
    `<div class="total-chip"><span>${p.name.split(' ')[0]}</span> <strong>${p.total}</strong></div>`
  ).join('');

  // Score inputs
  const fields = document.getElementById('score-fields');
  fields.innerHTML = '';
  state.players.forEach((p, i) => {
    const row = document.createElement('div');
    row.className = 'score-row';
    row.innerHTML = `
      <div class="player-icon">${p.name[0].toUpperCase()}</div>
      <div class="player-name">${p.name}</div>
      <input type="number" id="score-${i}" min="0" placeholder="0"
             value="${state.currentScores[i] !== undefined ? state.currentScores[i] : ''}"
             oninput="state.currentScores[${i}]=this.value" />
    `;
    fields.appendChild(row);
  });

  // History table
  renderHistory();
}

function renderHistory() {
  const hasRounds = state.players[0] && state.players[0].rounds.length > 0;
  document.getElementById('history-panel').style.display = hasRounds ? '' : 'none';
  if (!hasRounds) return;

  const tbl = document.getElementById('rounds-table');
  const numRounds = state.players[0].rounds.length;
  let html = '<thead><tr><th>Player</th>';
  for (let r = 1; r <= numRounds; r++) html += `<th>R${r}</th>`;
  html += '<th>Total</th></tr></thead><tbody>';
  state.players.forEach(p => {
    html += `<tr><td>${p.name}</td>`;
    p.rounds.forEach(s => html += `<td>${s}</td>`);
    html += `<td><strong>${p.total}</strong></td></tr>`;
  });
  html += '</tbody>';
  tbl.innerHTML = html;
}

function saveRound() {
  const scores = [];
  let allFilled = true;
  state.players.forEach((_, i) => {
    const inp = document.getElementById(`score-${i}`);
    const val = inp ? inp.value.trim() : '';
    if (val === '') { allFilled = false; } else { scores.push(parseInt(val, 10) || 0); }
  });
  if (!allFilled) { alert('Please enter scores for all players.'); return; }

  state.players.forEach((p, i) => {
    p.rounds.push(scores[i]);
    p.total += scores[i];
  });
  state.currentScores = {};
  buildScoreScreen();
  saveState();
}

function addRound() {
  state.currentRound++;
  state.currentScores = {};
  buildScoreScreen();
  window.scrollTo({ top: 0, behavior: 'smooth' });
  saveState();
}

// ══════════════════════════════════════
// SCREEN 4 — Results
// ══════════════════════════════════════
function endGame() {
  if (state.players[0].rounds.length === 0) {
    alert('Save at least one round before ending the game.');
    return;
  }
  state.phase = 'results';
  buildResults();
  showScreen('screen-results');
  saveState();
}

function buildResults() {
  const sorted = [...state.players].sort((a, b) => a.total - b.total);

  // Winner banner
  document.getElementById('winner-banner').innerHTML =
    `🏆 Winner: <strong>${sorted[0].name}</strong> with ${sorted[0].total} pts <span class="suit-deco">♠ ♥ ♦ ♣</span>`;

  // Leaderboard
  const lb = document.getElementById('leaderboard');
  lb.innerHTML = sorted.map((p, i) => {
    const trophy = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : '';
    return `
      <div class="lb-row${i === 0 ? ' rank-1' : ''}">
        <div class="lb-rank">${i + 1}</div>
        ${trophy ? `<div class="lb-trophy">${trophy}</div>` : ''}
        <div class="lb-name">${p.name}</div>
        <div class="lb-score">${p.total}<span class="lb-pts">pts</span></div>
      </div>`;
  }).join('');

  // Full history
  const hasRounds = state.players[0] && state.players[0].rounds.length > 0;
  const fhp = document.getElementById('final-history-panel');
  fhp.style.display = hasRounds ? '' : 'none';
  if (hasRounds) {
    const numRounds = state.players[0].rounds.length;
    const tbl = document.getElementById('final-rounds-table');
    let html = '<thead><tr><th>Player</th>';
    for (let r = 1; r <= numRounds; r++) html += `<th>R${r}</th>`;
    html += '<th>Total</th></tr></thead><tbody>';
    state.players.forEach(p => {
      html += `<tr><td>${p.name}</td>`;
      p.rounds.forEach(s => html += `<td>${s}</td>`);
      html += `<td><strong>${p.total}</strong></td></tr>`;
    });
    html += '</tbody>';
    tbl.innerHTML = html;
  }
}

function playAgain() {
  // Keep players, reset scores
  state.players = state.players.map(p => ({ ...p, rounds: [], total: 0 }));
  state.currentRound = 1;
  state.currentScores = {};
  state.phase = 'scoring';
  buildScoreScreen();
  showScreen('screen-score');
  saveState();
}

function confirmReset() {
  if (confirm('Reset everything and start fresh?')) {
    clearState();
    state = { phase: 'count', numPlayers: 0, players: [], currentRound: 1, currentScores: {} };
    buildCountGrid();
    showScreen('screen-count');
  }
}

// ══════════════════════════════════════
// INIT
// ══════════════════════════════════════
buildCountGrid();
restoreFromState();
</script>
</body>
</html>
